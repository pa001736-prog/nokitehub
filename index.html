<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Nokite Hub</title>
    <link rel="icon" type="image/png" href="/logoo.png" />
    <link rel="apple-touch-icon" href="/logoo.png" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="description" content="Nokite Hub - Sistema de Gestão para Barbearias. Agende seu horário de forma rápida e fácil." />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nokitehub.online/" />
    <meta property="og:title" content="Nokite Hub - Sistema para Barbearias" />
    <meta property="og:description" content="Agende seu horário na sua barbearia favorita de forma rápida e fácil." />
    <meta property="og:image" content="/logoo.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://nokitehub.online/" />
    <meta property="twitter:title" content="Nokite Hub - Sistema para Barbearias" />
    <meta property="twitter:description" content="Agende seu horário na sua barbearia favorita de forma rápida e fácil." />
    <meta property="twitter:image" content="/logoo.png" />
  </head>
  <body class="bg-slate-50">
    <div id="root">
      <div style="position: fixed; inset: 0; display: flex; items-center; justify-content: center; background: #f8fafc; font-family: sans-serif; flex-direction: column; gap: 20px;">
        <div style="width: 40px; height: 40px; border: 4px solid #2563eb; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p style="color: #64748b; font-weight: 600; font-size: 14px; letter-spacing: 0.05em; text-transform: uppercase;">Carregando Nokite Hub...</p>
      </div>
    </div>
    <style>
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
